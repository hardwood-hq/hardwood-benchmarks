# SLF4J simple binding config for the benchmark harness. Keeps the run output
# clean: only warnings and errors print (parquet/hadoop/netty INFO chatter is
# suppressed). Lower to "error" or "off" to quiet further, or raise to "info" to
# debug. This binding exists to give slf4j a StaticLoggerBinder and to give Netty
# a non-NOP slf4j backend (so it does not fall back to Hadoop's log4j 1.x).
org.slf4j.simpleLogger.defaultLogLevel=warn

# Hadoop's pure-Java fallback (no native libhadoop on the bench host) is benign and
# fires once at startup; silence just that logger rather than hiding all warnings.
org.slf4j.simpleLogger.log.org.apache.hadoop.util.NativeCodeLoader=error
